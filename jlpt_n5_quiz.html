<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5 真題題庫 — 2010-2013完整版</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a2e;--ink-mid:#3d3d5c;--ink-soft:#7b7b9e;
  --bg:#f5f4f0;--bg-card:#ffffff;--bg-panel:#eeecf5;
  --accent:#5c4dff;--accent-light:#ede9ff;--accent-mid:#8c7eff;
  --success:#1a7a4a;--success-bg:#e6f5ed;
  --danger:#c0392b;--danger-bg:#fdecea;
  --border:#dddae8;--radius:12px;--shadow:0 2px 12px rgba(92,77,255,0.08);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC','Noto Sans JP','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
.page-wrapper{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--ink);color:#fff;padding:1.5rem 1.25rem;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:1.5rem}
.logo-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-mid);font-weight:500}
.logo-title{font-size:22px;font-weight:700;color:#fff;line-height:1.2;margin-top:2px}
.logo-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px}
.section-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;font-weight:500}
.cat-list{display:flex;flex-direction:column;gap:3px}
.cat-btn{background:transparent;border:none;border-radius:8px;padding:8px 11px;text-align:left;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;font-family:inherit;width:100%}
.cat-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.cat-btn.active{background:var(--accent);color:#fff;font-weight:500}
.cat-count{font-size:11px;background:rgba(255,255,255,.15);border-radius:20px;padding:1px 7px}
.cat-btn.active .cat-count{background:rgba(255,255,255,.25)}
.score-panel{background:rgba(255,255,255,.06);border-radius:10px;padding:.875rem;border:1px solid rgba(255,255,255,.1)}
.score-nums{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.score-num{text-align:center;background:rgba(255,255,255,.05);border-radius:8px;padding:8px 4px}
.score-num .n{font-size:20px;font-weight:700;color:#fff}
.score-num .l{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.progress-bar-wrap{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:10px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent-mid);border-radius:2px;transition:width .4s ease}
.main{padding:2rem 1.75rem;max-width:800px}
.question-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.q-counter{font-size:13px;color:var(--ink-soft);font-weight:500}
.q-source{font-size:11px;background:var(--accent-light);color:var(--accent);border-radius:20px;padding:3px 10px;font-weight:500}
.question-card{background:var(--bg-card);border-radius:var(--radius);padding:1.75rem;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:1rem;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.question-text{font-size:17px;line-height:1.85;color:var(--ink);margin-bottom:1.5rem;font-weight:500;white-space:pre-wrap}
.options{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opt-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--ink);cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:flex-start;gap:9px;font-family:inherit;line-height:1.45}
.opt-num{width:22px;height:22px;border-radius:50%;background:var(--border);color:var(--ink-soft);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light)}
.opt-btn:hover:not(:disabled) .opt-num{background:var(--accent);color:#fff}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:var(--success-bg);border-color:var(--success);color:var(--success)}
.opt-btn.correct .opt-num{background:var(--success);color:#fff}
.opt-btn.wrong{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.opt-btn.wrong .opt-num{background:var(--danger);color:#fff}
.opt-btn.show-correct{background:var(--success-bg);border-color:var(--success);color:var(--success)}
.opt-btn.show-correct .opt-num{background:var(--success);color:#fff}
.explanation{margin-top:1.1rem;padding:.9rem 1.1rem;background:var(--bg-panel);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;font-size:13.5px;color:var(--ink-mid);line-height:1.7;display:none}
.explanation.show{display:block;animation:fadeUp .2s ease}
.explanation strong{color:var(--accent)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;gap:8px}
.nav-btn{background:var(--bg-card);border:1.5px solid var(--border);border-radius:8px;padding:8px 18px;font-size:13.5px;color:var(--ink-mid);cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;display:none}
.nav-btn.primary:hover{background:#4a3de0}
.nav-btn.primary.visible{display:flex}
.q-dots{display:flex;gap:5px;flex-wrap:wrap;max-width:340px;justify-content:center}
.q-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s;cursor:pointer;flex-shrink:0}
.q-dot.current{background:var(--accent);transform:scale(1.4)}
.q-dot.done-correct{background:var(--success)}
.q-dot.done-wrong{background:var(--danger)}
.result-screen{background:var(--bg-card);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);animation:fadeUp .3s ease}
.result-ring{width:120px;height:120px;margin:0 auto 1.25rem;position:relative}
.result-ring svg{transform:rotate(-90deg)}
.result-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--accent)}
.result-title{font-size:21px;font-weight:700;margin-bottom:6px}
.result-sub{color:var(--ink-soft);margin-bottom:1.75rem;font-size:14px}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.75rem}
.result-stat{background:var(--bg);border-radius:10px;padding:.875rem}
.result-stat .n{font-size:24px;font-weight:700;color:var(--ink)}
.result-stat .l{font-size:11px;color:var(--ink-soft);margin-top:2px}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.result-btn{border-radius:8px;padding:9px 22px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .15s}
.result-btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--ink-mid)}
.result-btn.outline:hover{border-color:var(--accent);color:var(--accent)}
.result-btn.filled{background:var(--accent);border:none;color:#fff}
.result-btn.filled:hover{background:#4a3de0}
.mobile-header{display:none;background:var(--ink);padding:12px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mobile-title{color:#fff;font-size:15px;font-weight:700}
.menu-btn{background:rgba(255,255,255,.1);border:none;border-radius:6px;color:#fff;padding:5px 10px;font-size:18px;cursor:pointer}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200}
.sidebar-overlay.open{display:block}
@media(max-width:768px){
  .page-wrapper{grid-template-columns:1fr}
  .mobile-header{display:flex}
  .sidebar{position:fixed;left:-270px;top:0;width:260px;height:100vh;z-index:300;transition:left .3s ease}
  .sidebar.open{left:0}
  .main{padding:1.25rem 1rem}
  .options{grid-template-columns:1fr}
  .result-grid{grid-template-columns:1fr 1fr}
  .q-dots{max-width:220px}
}
</style>
</head>
<body>
<div class="mobile-header">
  <span class="mobile-title">JLPT N5 真題題庫</span>
  <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
</div>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="page-wrapper">
<aside class="sidebar" id="sidebar">
  <div>
    <div class="logo-label">真題練習</div>
    <div class="logo-title">JLPT N5</div>
    <div class="logo-sub">2010&#8211;2013 完整三份真題</div>
  </div>
  <div>
    <div class="section-label">題目分類</div>
    <div class="cat-list" id="cat-list"></div>

  <div class="score-panel">
    <div class="section-label">本次成績</div>
    <div class="score-nums">

  </div>
</aside>
<main class="main" id="main-area"></main>
</div>
<script>
const Q = {"文字①漢字讀音": [{"q": "いすの（上）にねこがいます。", "opts": ["した", "うえ", "まえ", "よこ"], "ans": 1, "exp": "上(うえ)＝上面。した=下，まえ=前，よこ=旁邊", "src": "2013年7月"}, {"q": "きのうから（目）がいたいです。", "opts": ["め", "みみ", "あたま", "おなか"], "ans": 0, "exp": "目(め)＝眼睛", "src": "2013年7月"}, {"q": "（父）のしゅみはテニスです。", "opts": ["あに", "はは", "ちち", "あね"], "ans": 2, "exp": "父(ちち)＝父親。あに=哥，はは=媽，あね=姊", "src": "2013年7月"}, {"q": "きょうはいい（天気）ですね。", "opts": ["てんき", "でんき", "でんぎ", "てんぎ"], "ans": 0, "exp": "天気(てんき)＝天氣", "src": "2013年7月"}, {"q": "きのうたなかさんに（話しました）。", "opts": ["はなしました", "かしました", "かえしました", "わたしました"], "ans": 0, "exp": "話す(はなす)＝說話。貸す=借出，返す=歸還，渡す=遞交", "src": "2013年7月"}, {"q": "アパートの（南がわ）にこうえんがあります。", "opts": ["ひがしがわ", "みなみがわ", "きたがわ", "にしがわ"], "ans": 1, "exp": "南(みなみ)＝南方", "src": "2013年7月"}, {"q": "そとに（出て）ください。", "opts": ["だて", "でて", "でして", "だして"], "ans": 1, "exp": "出る(でる)のて形＝でて", "src": "2013年7月"}, {"q": "あの（女の子）は５さいです。", "opts": ["おんなのこう", "おんなのこ", "おなのこ", "おなのこう"], "ans": 1, "exp": "女の子(おんなのこ)＝女孩，固有訓讀", "src": "2013年7月"}, {"q": "にほんごのせんせいは（何人）いますか。", "opts": ["なんひと", "なににん", "なんにん", "なにひと"], "ans": 2, "exp": "何人(なんにん)＝幾個人", "src": "2013年7月"}, {"q": "このとけいは（八百円）です。", "opts": ["はちびゃくえん", "はっぴゃくえん", "はっぴゃっえん", "はちひゃくえん"], "ans": 1, "exp": "八百＝はっぴゃく。八+百行助數詞發促音變", "src": "2013年7月"}, {"q": "（土よう日）にテストがあります。", "opts": ["かようび", "きんようび", "もくようび", "どようび"], "ans": 3, "exp": "土曜日(どようび)＝星期六", "src": "2013年7月"}, {"q": "けさは（四時）におきました。", "opts": ["よんじ", "よじ", "くじ", "きゅうじ"], "ans": 1, "exp": "四時(よじ)。特殊讀音，不說よんじ", "src": "2013年7月"}, {"q": "すみません、（水）をください。", "opts": ["すい", "ずい", "みず", "みす"], "ans": 2, "exp": "水(みず)＝水，日語固有訓讀", "src": "2012年12月"}, {"q": "まいあさ８じに（学校）にいきます。", "opts": ["かくこう", "がくこう", "かっこう", "がっこう"], "ans": 3, "exp": "学校(がっこう)。前字末音く+か行→促音變がっこう", "src": "2012年12月"}, {"q": "このコートは（安い）ですね。", "opts": ["やすい", "かるい", "ふるい", "うすい"], "ans": 0, "exp": "安い(やすい)＝便宜", "src": "2012年12月"}, {"q": "きょうはしゅくだいが（少ない）です。", "opts": ["すこない", "すくない", "すごない", "すぐない"], "ans": 1, "exp": "少ない(すくない)＝少", "src": "2012年12月"}, {"q": "このふくは（六万円）です。", は1番きょうしつ、女の学生は3番きょうしつ。5時からは3番きょうしつでいっしょに練習します。」\n\n男の学生はどこで歌の練習をしますか。", "opts": ["4時から6時まで1番きょうしつ", "4時から6時まで3番きょうしつ", "4時からは1番、5時からは3番きょうしつ", "4時からは3番、5時からは1番きょうしつ"], "ans": 2, "exp": "男→4時〜5時は1番、5時〜は3番でいっしょに", "src": "2013年7月"}, {"q": "レナさんは来週から日本語学校に行きます。テキストはきのう買いました。じしょはお兄さんにもらいました。ノートとえんぴつは今日の午後買いに行きます。\n\nレナさんがもう持っているものは何ですか。", "opts": ["テキストとじしょ", "ノートとえんぴつ", "テキストとノートとえんぴつ", "じしょとノートとえんぴつ"], "ans": 0, "exp": "テキスト（昨日購入）＋じしょ（兄にもらった）。ノートとえんぴつは今日これから買う", "src": "2013年7月"}, {"q": "【文章】先月ホテルのきっさてん「リボン」で森さんとケーキを食べました。とてもおいしかった。①きのう森さんがあそびに来ました。わたしは森さんが来る前に「リボン」にケーキを買いに行って、ばんごはんのあとでいっしょに食べました。\n\n①きのう森さんと「わたし」はどこでケーキを食べましたか。", "opts": ["駅のきっさてん", "ホテルのきっさてん", "「わたし」のうち", "森さんのうち"], "ans": 2, "exp": "リボンでケーキを買ってきて、家でいっしょに食べた", "src": "2013年7月"}, {"q": "【文章続き】でも、先月「リボン」で食べたケーキのほうがおいしかったです。森さん「静かなホテルのきっさてんできれいなおんがくを聞きながら食べたからですよ。」わたしたちは②「また『リボン』に行きましょう。」と言ってわらいました。\n\n②「また『リボン』に行きましょう。」と言ったのはどうしてですか。", "opts": ["うちで作ったケーキはおいしくないから", "また「リボン」のケーキを買いたいから", "友だちといっしょに食べるケーキのほうがおいしいから", "「リボン」の店の中で食べるケーキのほうがおいしいから"], "ans": 3, "exp": "静かなホテルの雰囲気とおんがくの中で食べることがおいしさの理由", "src": "2013年7月"}, {"q": "【夏の旅行パンフレット（XYZ旅行）】\n① 山の花の写真・電車・立木町・8/20〜21（2日間）・15,000円\n② すずしい山・バス・川北町・8/20〜22（3日間）・23,000円\n③ 海で魚・ひこうき・花中町・8/21〜24（4日間）・28,000円\n④ きれいな海・電車とバス・西田町・8/21〜22（2日間）・18,000円\n\nフォンさんの休みは二日間。海へ行きたいです。どの旅行に行きますか。", "opts": ["①", "②", "③", "④"], "ans": 3, "exp": "海に行きたい→③か④。2日間→①か④。共通は④のみ", "src": "2013年7月"}, {"q": "今日、安木駅からバスに乗って京山大学へ行きました。大学の中には大きなとしょかんや食堂がありました。大学のとなりには広いこうえんもありました。\n\n大学のそばに何がありますか。", "opts": ["安木駅", "としょかん", "食堂", "こうえん"], "ans": 3, "exp": "大学のとなりに広いこうえんがありました", "src": "2012年12月"}, {"q": "【山田先生のメール（日本語Aクラスへ）】\n「来週水曜日の午前のじゅぎょうでDVDを見ます。いつもの103きょうしつではなく、105きょうしつに来てください。午後のじゅぎょうはいつもと同じ103きょうしつです。」\n\n日本語Aクラスの学生は来週の水曜日にどのきょうしつへ行きますか。", "opts": ["午前も103、午後も103", "午前も105、午後も105", "午前は103、午後は105", "午前は105、午後は103"], "ans": 3, "exp": "午前→105（DVDのため変更）、午後→いつもの103", "src": "2012年12月"}, {"q": "【メモ（大西山→エミ）】\n「電車のきっぷを買ってきました。1枚はエミさんのです。もう1枚は、高木さんにわたしてください。アリさんには、わたしがわたします。」\n\nエミさんの机の上にだれのきっぷがありますか。", "opts": ["エミと高木とアリと大西山", "エミと高木とアリ", "エミと高木", "エミとアリ"], "ans": 2, "exp": "机の上＝エミの分＋高木さんへ渡す分。アリの分は大西山が直接渡す", "src": "2012年12月"}, {"q": "【ラジャ→山中家への手紙】\n「…みなさんといっしょの夏休みはとても楽しかったです。京子さんとプールで泳いだり、お母さんと日本のりょうりを作ったりしました。…」\n\nラジャさんは先週何をしましたか。", "opts": ["しゃしんをとったり、学校で日本語を習ったりしました", "プールに行ったり、りょうりを作ったり食べたりしました", "くにのことばでたくさん話したり、手紙を書いたりしました", "おにぎりの作り方を教えたり、みそしるを作ったりしました"], "ans": 1, "exp": "プールで泳いだ＋日本料理を作って食べた", "src": "2012年12月"}, {"q": "【手紙続き】\n「…わたしが作ったカレーも みなさんが『おいしいですね。』と言いましたから、うれしかったです。みなさんとったしゃしんを見ながら、この手紙を書いています。来週の月曜日からまた学校がはじまります。それではまた。」\n\nこの手紙でラジャさんは何がいちばん言いたいですか。", "opts": ["おすしの作り方を習いたいです。おねがいします", "カレーがおいしかったです。また作ってください", "先週は楽しかったです。ありがとうございました", "月曜日から学校がはじまります。うれしいです"], "ans": 2, "exp": "手紙全体のトーン：先週が楽しかった＋感謝が主旨", "src": "2012年12月"}, {"q": "【はじめましてパーティー案内】\n時間：4月20日（金）午後5〜7時\n場所：水口日本語学校 302きょうしつ\n持ってくるもの（300円ぐらいの食べ物）：\n・おかし → Aクラス・Bクラスの人\n・くだもの → Cクラスの人\n（※飲み物は学校が買います）\n\nアンさんはCクラスです。何を持っていきますか。", "opts": ["300円", "おかし", "くだもの", "飲み物"], "ans": 2, "exp": "Cクラスの人はくだものを持ってくる", "src": "2012年12月"}, {"q": "わたしは、今日、友だちと買い物に行きました。3か月前に見たえいがのDVDがほしかったからです。買ったDVDは、友だちや姉といっしょに見ます。\n\n「わたし」は今日、何をしましたか。", "opts": ["友だちとえいがを見に行きました", "友だちとDVDを買いに行きました", "姉とえいがを見に行きました", "姉とDVDを買いに行きました"], "ans": 1, "exp": "今日、友だちと買い物に行ってDVDを買った", "src": "2010-2011年"}, {"q": "わたしのへやには、テーブルが一つといすが二つと本だなが一つあります。本がたくさんありますから、もっと大きい本だながほしいです。\n\n今のへやはどれですか。\n（選項圖示 1:テーブル1＋いす2＋小本棚 / 2:テーブル1＋いす4＋大本棚 / 3:テーブル1＋いす2＋大本棚 / 4:テーブル1＋いす2＋本棚なし）", "opts": ["①", "②", "③", "④"], "ans": 2, "exp": "テーブル1＋いす2＋本だな1（もっと大きいのがほしい＝今は小さい）→③", "src": "2010-2011年"}, {"q": "【山口先生のメモ（森さんへ）】\n「クラスで使う本を中川先生にかりました。5ページを25枚コピーしてください。コピーは南さんにわたしてください。本は、わたしが明日かえしますから、わたしの机の上においてください。」\n\n森さんはコピーをしたあとで、本をどうしますか。", "opts": ["クラスで使います", "南さんにわたします", "中川先生にかえします", "山口先生の机の上におきます"], "ans": 3, "exp": "本は山口先生が明日返すから、山口先生の机の上においてください", "src": "2010-2011年"}, {"q": "【文章】きのうの夜おそくまでしごとをしました。しごとのあと電車で帰りました。家の近くの駅で電車をおりました。外は雨でしたが、わたしはかさがありませんでした。とてもこまりました。\n\nどうしてこまりましたか。", "opts": ["おそい時間に駅に着いたから", "しごとがたくさんあったから", "とてもつかれたから", "かさがなかったから"], "ans": 3, "exp": "外は雨でしたが、わたしはかさがありませんでした", "src": "2010-2011年"}, {"q": "【文章続き】駅の人「あのはこの中のかさを使ってください。お金はいりません。あした、あのはこにかえしてください。」\n\n「わたし」はあしたどうしますか。", "opts": ["お金をはこの中に入れます", "お金を駅の人にわたします", "かさをはこの中に入れます", "かさを駅の人にわたします"], "ans": 2, "exp": "あした、あのはこにかえしてください＝かさをはこに返す", "src": "2010-2011年"}, {"q": "【あきらや チラシ】\n営業：朝8:00〜夜9:00\n期間セール①：6/11(月)〜14(木)　さとう128円・トイレットペーパー490円\n期間セール②：6/15(金)〜18(月)　しょうゆ198円・ティッシュペーパー290円\n毎週安い日：月・火→くだもの、魚、ジュース / 水・木→とうふ、にく、やさい / 金・土→パン、ぎゅうにゅう、魚、やさい\n\nあきらやでトイレットペーパーとにくとやさいを同じ日に買いたいです。いつが安いですか。", "opts": ["6月17日（日）と18日（月）", "6月13日（水）と14日（木）", "6月15日（金）と16日（土）", "6月11日（月）と12日（火）"], "ans": 1, "exp": "トイレットペーパー安い期間＝6/11〜14。にく・やさい毎週安い日＝水・木。重なるのは13日(水)と14日(木)", "src": "2010-2011年"}]};

const catNames = Object.keys(Q);
let currentCat = catNames[0];
let currentIdx = 0;
let answered = false;
let dotState = {};
let globalCorrect = 0, globalTotal = 0;
catNames.forEach(k => { dotState[k] = Array(Q[k].length).fill(null); });

function renderCats() {
  document.getElementById('cat-list').innerHTML = catNames.map(k => {
    const done = dotState[k].filter(x=>x!==null).length;
    const cor = dotState[k].filter(x=>x===true).length;
    const pctText = done>0 ? ` ${cor}/${done}` : '';
    return `<button class="cat-btn ${k===currentCat?'active':''}" onclick="selectCat(${JSON.stringify(k)})">
      <span>${k}</span><span class="cat-count">${Q[k].length}題${pctText}</span>
    </button>`;
  }).join('');
}

function selectCat(cat) {
  currentCat = cat; currentIdx = 0; answered = false;
  renderCats(); renderQ();
  if (window.innerWidth<=768) toggleSidebar();
}

function updateSB() {
  document.getElementById('sb-correct').textContent = globalCorrect;
  document.getElementById('sb-total').textContent = globalTotal;
  const pct = globalTotal>0 ? Math.round(globalCorrect/globalTotal*100) : 0;
  document.getElementById('sb-bar').style.width = pct+'%';
}

function renderQ() {
  const qs = Q[currentCat];
  if (currentIdx >= qs.length) { renderResult(); return; }
  const q = qs[currentIdx];
  const dots = qs.map((_,i)=>{
    const s = dotState[currentCat][i];
    const c = i===currentIdx?'current':s===true?'done-correct':s===false?'done-wrong':'';
    return `<div class="q-dot ${c}" onclick="jumpTo(${i})" title="第${i+1}題"></div>`;
  }).join('');
  document.getElementById('main-area').innerHTML = `
    <div class="question-header">
      <span class="q-counter">第 ${currentIdx+1} 題 / 共 ${qs.length} 題</span>
      <span class="q-source">${q.src}</span>
    </div>
    <div class="question-card">
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>`
          <button class="opt-btn" id="opt${i}" onclick="checkAns(${i})">
            <span class="opt-num">${i+1}</span><span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="explanation" id="exp"><strong>解析：</strong>${q.exp}</div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevQ()">&#8592; 上一題</button>
      <div class="q-dots">${dots}</div>
      <button class="nav-btn primary" id="next-btn" onclick="nextQ()">下一題 &#8594;</button>
    </div>`;
  answered = false;
}

function checkAns(i) {
  if (answered) return;
  answered = true;
  const q = Q[currentCat][currentIdx];
  globalTotal++;
  if (i===q.ans) {
    globalCorrect++;
    dotState[currentCat][currentIdx] = true;
    document.getElementById('opt'+i).classList.add('correct');
  } else {
    dotState[currentCat][currentIdx] = false;
    document.getElementById('opt'+i).classList.add('wrong');
    document.getElementById('opt'+q.ans).classList.add('show-correct');
  }
  for(let j=0;j<q.opts.length;j++) document.getElementById('opt'+j).disabled=true;
  document.getElementById('exp').classList.add('show');
  document.getElementById('next-btn').classList.add('visible');
  updateSB(); renderCats();
}

function nextQ() { currentIdx++; answered=false; renderQ(); }
function prevQ() { if(currentIdx>0){currentIdx--;answered=false;renderQ();} }
function jumpTo(i) { currentIdx=i; answered=false; renderQ(); }

function renderResult() {
  const qs = Q[currentCat];
  const cor = dotState[currentCat].filter(x=>x===true).length;
  const tot = dotState[currentCat].filter(x=>x!==null).length;
  const pct = tot>0?Math.round(cor/tot*100):0;
  const msg = pct>=80?'優秀！繼續保持！':pct>=60?'還不錯，繼續加油！':'多練習就會進步！';
  const r=46,circ=2*Math.PI*r,dash=circ*pct/100;
  document.getElementById('main-area').innerHTML=`
    <div class="result-screen">
      <div class="result-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="#eeecf5" stroke-width="8"/>
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="#5c4dff" stroke-width="8"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
        </svg>
        <div class="result-pct">${pct}%</div>
      </div>
      <div class="result-title">${msg}</div>
      <div class="result-sub">${currentCat} 完成</div>
      <div class="result-grid">
        <div class="result-stat"><div class="n">${cor}</div><div class="l">答對</div></div>
        <div class="result-stat"><div class="n">${tot-cor}</div><div class="l">答錯</div></div>
        <div class="result-stat"><div class="n">${qs.length}</div><div class="l">總題數</div></div>
      </div>
      <div class="result-btns">
        <button class="result-btn outline" onclick="restartCat()">重新練習</button>
        <button class="result-btn filled" onclick="nextCat()">下一分類 &#8594;</button>
      </div>
    </div>`;
}

function restartCat() {
  currentIdx=0; answered=false;
  dotState[currentCat]=Array(Q[currentCat].length).fill(null);
  renderQ(); renderCats();
}
function nextCat() {
  const i=catNames.indexOf(currentCat);
  selectCat(catNames[(i+1)%catNames.length]);
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

renderCats(); renderQ(); updateSB();
</script>
</body>
</html>
